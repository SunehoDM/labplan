<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>LabPlan</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#eee9e2">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html{height:100%}
body{height:100%;min-height:100vh;background:#eee9e2;font-family:-apple-system,'Segoe UI',system-ui,sans-serif;color:#1a1714}
:root{
  --bg:#eee9e2;--sf:#faf8f5;--sf2:#f0ece6;
  --bd:#d8d2c8;--bd2:#c4bdb2;
  --t:#1a1714;--t2:#4a4540;--t3:#8a8480;
  --ac:#5b4fcf;--ac-bg:#eeecfa;--ac-t:#3a308a;
  --td-bg:#eceafa;--td-bd:#a09ae0;
  --r:10px;
}
.app{display:flex;flex-direction:column;height:100vh;min-height:600px}

/* TOPBAR */
.topbar{flex-shrink:0;background:var(--sf);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 14px;gap:8px;height:52px;z-index:10}
.logo{font-size:15px;font-weight:700;color:var(--t);letter-spacing:-.02em;white-space:nowrap}
.logo span{color:var(--ac)}
.nav-center{flex:1;display:flex;align-items:center;justify-content:center;gap:7px}
.nav-btn{background:var(--sf2);border:1px solid var(--bd);color:var(--t2);padding:5px 11px;border-radius:7px;cursor:pointer;font-size:13px;font-weight:600;display:flex;align-items:center;gap:3px;line-height:1}
.nav-btn:hover{background:var(--bd);color:var(--t)}
.mlabel{font-size:14px;font-weight:700;color:var(--t);min-width:160px;text-align:center}
.btn-today{background:var(--ac);border:none;color:#fff;padding:5px 12px;border-radius:7px;cursor:pointer;font-size:13px;font-weight:600}
.view-tabs{display:flex;gap:3px}
.tab{background:var(--sf2);border:1px solid var(--bd);color:var(--t2);padding:5px 11px;border-radius:7px;cursor:pointer;font-size:12px;font-weight:600}
.tab:hover{color:var(--t);background:var(--bd)}
.tab.on{background:var(--ac);border-color:var(--ac);color:#fff}
.add-btn{background:var(--ac);border:none;color:#fff;padding:5px 12px;border-radius:7px;cursor:pointer;font-size:13px;font-weight:700;display:flex;align-items:center;gap:4px;white-space:nowrap}
.add-btn:hover{opacity:.9}

/* BODY LAYOUT */
.body-row{flex:1;display:flex;min-height:0}
.sidebar{width:210px;flex-shrink:0;background:var(--sf);border-right:1px solid var(--bd);display:flex;flex-direction:column;overflow-y:auto;padding:12px 8px;transition:width 0.2s,padding 0.2s}
.sidebar.collapsed{width:0;padding:0;overflow:hidden;border:none}
.menu-btn{display:flex;background:none;border:none;color:var(--t2);padding:5px 7px;border-radius:7px;cursor:pointer;align-items:center;justify-content:center;flex-shrink:0}
.menu-btn:hover{background:var(--sf2);color:var(--t)}
@media(max-width:640px){
  .app{min-height:100dvh}
  .sidebar{position:fixed;left:0;top:52px;bottom:0;z-index:50;width:240px;box-shadow:4px 0 20px rgba(0,0,0,.12)}
  .sidebar.collapsed{width:0;box-shadow:none}
  .mlabel{min-width:100px;font-size:12px}
  .mob-overlay{display:none;position:fixed;inset:0;top:52px;background:rgba(0,0,0,.3);z-index:49}
  .mob-overlay.on{display:block}
  .add-btn .btn-txt{display:none}
  .view-tabs{gap:2px}
  .tab{padding:5px 8px;font-size:11px}
  .dcell{min-height:56px;padding:3px}
  .dnum{font-size:11px;margin-bottom:2px}
  .pill{font-size:9px;padding:1px 4px}
  .mgrid{gap:2px}
  .dow-cell{font-size:9px}
  .month-wrap{padding:6px}
}
@media(max-width:400px){
  .dcell{min-height:44px;padding:2px}
  .pill{display:none}
  .pmore{display:none}
}

.slabel{font-size:10px;font-weight:700;letter-spacing:.09em;color:var(--t3);text-transform:uppercase;margin:0 4px 5px}
.cat-btn{display:flex;align-items:center;gap:7px;padding:6px 7px;border-radius:7px;border:none;background:none;width:100%;text-align:left;font-size:12px;color:var(--t2);cursor:pointer;font-weight:600}
.cat-btn:hover{background:var(--sf2);color:var(--t)}
.cat-btn.on{background:var(--ac-bg);color:var(--ac-t)}
.cat-n{margin-left:auto;font-size:10px;color:var(--t3);font-weight:500}
.sdiv{height:1px;background:var(--bd);margin:8px 4px}
.gcal-area{padding:0 4px}
.gcal-btn{width:100%;background:none;border:1px solid var(--bd);color:var(--t2);padding:6px 9px;border-radius:7px;cursor:pointer;font-size:12px;font-weight:600;text-align:left;display:flex;align-items:center;gap:6px}
.gcal-btn:hover{background:var(--sf2);color:var(--t)}
.gcal-ok{font-size:11px;color:#2a6e3a;background:#e8f5ec;border-radius:7px;padding:6px 8px;display:flex;align-items:center;gap:5px;font-weight:600}
/* GLASS WIDGET */
.glass{margin:0 4px;position:relative;overflow:hidden;border-radius:14px;padding:12px 13px;background:rgba(250,248,245,.62);border:1px solid rgba(255,255,255,.85);box-shadow:0 4px 18px rgba(100,90,80,.13),inset 0 1px 0 rgba(255,255,255,.9)}
.glass::before{content:'';position:absolute;inset:0;background:linear-gradient(140deg,rgba(255,255,255,.32) 0%,transparent 55%);border-radius:14px;pointer-events:none}
.gdate{font-size:10px;font-weight:700;letter-spacing:.06em;color:var(--t2);margin-bottom:7px;text-transform:uppercase}
.gentry{display:flex;align-items:center;gap:7px;padding:3px 0;border-bottom:1px solid rgba(180,172,162,.28)}
.gentry:last-child{border:none}
.gdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.gtitle{font-size:11px;color:var(--t);flex:1;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gtime{font-size:10px;color:var(--t3)}
.gempty{font-size:11px;color:var(--t3);font-style:italic;padding:2px 0}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}

/* MONTH */
.mwrap{flex:1;overflow-y:auto;padding:10px}
.dow-row{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:4px}
.dow-cell{text-align:center;font-size:10px;font-weight:700;color:var(--t3);padding:3px 0;text-transform:uppercase;letter-spacing:.07em}
.mgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.dcell{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);min-height:82px;padding:5px;cursor:pointer;transition:background .1s,border-color .1s}
.dcell:hover{background:var(--ac-bg);border-color:var(--td-bd)}
.dcell.other{background:var(--sf2);opacity:.52}
.dcell.today{background:var(--td-bg);border:1.5px solid var(--td-bd)}
.dnum{font-size:12px;font-weight:700;color:var(--t2);margin-bottom:3px;display:block}
.dcell.today .dnum{color:var(--ac-t)}
.dcell.other .dnum{color:var(--t3)}
.pill{border-radius:4px;padding:2px 5px;font-size:10px;font-weight:700;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;display:flex;align-items:center;gap:3px}
.pmore{font-size:10px;color:var(--t3);margin-top:1px}

/* DAY VIEW */
.dview{flex:1;display:flex;flex-direction:column;overflow:hidden}
.dvhead{background:var(--sf);border-bottom:1px solid var(--bd);padding:9px 14px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.dvtitle{font-size:14px;font-weight:700;color:var(--t)}
.back-btn{background:var(--sf2);border:1px solid var(--bd);color:var(--t2);padding:4px 10px;border-radius:7px;cursor:pointer;font-size:12px;font-weight:600;display:flex;align-items:center;gap:4px}
.back-btn:hover{color:var(--t);background:var(--bd)}
.dvscroll{flex:1;overflow-y:auto;padding:0}
.tblock{display:flex;gap:0;min-height:52px;position:relative;cursor:pointer}
.tblock:hover .tblock-bg{background:var(--ac-bg)}
.tblock-bg{position:absolute;inset:0;border-top:1px solid var(--bd);transition:background .1s;z-index:0}
.tblock:first-child .tblock-bg{border-top:none}
.tlabel{width:52px;flex-shrink:0;padding:6px 10px 0 0;text-align:right;position:relative;z-index:1}
.tlabel-hour{font-size:11px;font-weight:700;color:var(--t2);line-height:1}
.tlabel-min{font-size:9px;color:var(--t3);font-weight:500}
.tevents{flex:1;padding:5px 12px 5px 0;display:flex;flex-direction:column;gap:3px;position:relative;z-index:1;min-height:52px}
.tblock-hint{font-size:10px;color:var(--t3);opacity:0;transition:opacity .15s;padding-top:2px;font-style:italic}
.tblock:hover .tblock-hint{opacity:1}
.devt{border-radius:8px;padding:7px 10px;cursor:pointer;display:flex;align-items:flex-start;gap:8px;border-left:3px solid transparent;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.devt:hover{filter:brightness(.97)}
.devt-title{font-size:12px;font-weight:700}
.devt-note{font-size:11px;margin-top:2px;opacity:.72}
.devt-time{font-size:10px;margin-left:auto;white-space:nowrap;padding-top:1px;font-weight:600}
/* custom date field */
.date-fields{display:flex;align-items:center;gap:4px}
.date-fields input{background:var(--sf2);border:1px solid var(--bd);border-radius:8px;padding:7px 0;color:var(--t);font-size:13px;outline:none;font-family:inherit;font-weight:500;text-align:center}
.date-fields input:focus{border-color:var(--ac);box-shadow:0 0 0 3px rgba(91,79,207,.1)}
.date-fields .df-sep{color:var(--t3);font-weight:700;font-size:14px;flex-shrink:0}
.df-dd{width:42px}
.df-mm{width:42px}
.df-yyyy{width:58px}

/* TASKS */
.tview{flex:1;overflow-y:auto;padding:12px}
.tgroup{margin-bottom:15px}
.tghead{display:flex;align-items:center;gap:7px;margin-bottom:5px;padding:0 2px}
.tgname{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--t2)}
.trow{display:flex;align-items:flex-start;gap:8px;padding:6px 9px;background:var(--sf);border:1px solid var(--bd);border-radius:8px;margin-bottom:3px}
.chk{width:15px;height:15px;border-radius:4px;border:1.5px solid var(--bd2);cursor:pointer;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;background:#fff}
.chk.done{background:var(--ac);border-color:var(--ac)}
.ttxt{font-size:12px;color:var(--t);flex:1;font-weight:600}
.ttxt.done{text-decoration:line-through;color:var(--t3)}
.tmeta{font-size:10px;color:var(--t3);margin-top:1px;font-weight:500}
.delbtn{background:none;border:none;color:var(--t3);cursor:pointer;font-size:14px;padding:0 2px;line-height:1}
.delbtn:hover{color:#c0392b}
.empty-msg{text-align:center;color:var(--t3);padding:36px;font-size:13px}

/* MODAL */
.mbg{position:fixed;inset:0;background:rgba(180,172,160,.5);display:flex;align-items:center;justify-content:center;padding:16px;z-index:200}
.mbg-blur{backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}
.modal{background:#faf8f5;border:1px solid var(--bd);border-radius:16px;width:100%;max-width:440px;padding:20px;box-shadow:0 12px 48px rgba(80,70,60,.2);max-height:92vh;overflow-y:auto}
.modal h3{font-size:15px;font-weight:700;margin-bottom:14px;color:var(--t)}
.f{margin-bottom:10px}
.f label{display:block;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--t3);margin-bottom:4px}
.f input,.f textarea{width:100%;background:var(--sf2);border:1px solid var(--bd);border-radius:8px;padding:7px 10px;color:var(--t);font-size:13px;outline:none;font-family:inherit;font-weight:500}
.f input:focus,.f textarea:focus{border-color:var(--ac);box-shadow:0 0 0 3px rgba(91,79,207,.1)}
.f textarea{resize:vertical;min-height:52px}
.t2col{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.cgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:4px}
.cpick{padding:7px 3px;border-radius:8px;border:1.5px solid var(--bd);background:var(--sf2);cursor:pointer;font-size:10px;text-align:center;color:var(--t2);line-height:1.4;font-weight:600;display:flex;flex-direction:column;align-items:center;gap:3px}
.cpick:hover{background:var(--ac-bg);color:var(--ac-t);border-color:var(--td-bd)}
.cpick.on{background:var(--ac-bg);border-color:var(--ac);color:var(--ac-t)}
.rem-btn{background:var(--sf2);border:1.5px solid var(--bd);color:var(--t2);padding:5px 4px;border-radius:7px;cursor:pointer;font-size:11px;font-weight:700;text-align:center}
.rem-btn:hover{background:var(--ac-bg);color:var(--ac-t);border-color:var(--td-bd)}
.rem-btn.on{background:var(--ac-bg);border-color:var(--ac);color:var(--ac-t)}
.macts{display:flex;gap:8px;margin-top:13px;justify-content:flex-end;align-items:center}
.m-cancel{background:none;border:1px solid var(--bd);color:var(--t2);padding:7px 13px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600}
.m-cancel:hover{background:var(--sf2)}
.m-save{background:var(--ac);border:none;color:#fff;padding:7px 15px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:700}
.m-del{background:none;border:1px solid #e8a8a8;color:#8a2020;padding:7px 13px;border-radius:8px;cursor:pointer;font-size:13px;margin-right:auto;font-weight:600}
.m-del:hover{background:#fdf0f0}
.toast{position:fixed;bottom:20px;right:20px;background:#2d2a26;color:#fff;padding:9px 15px;border-radius:10px;font-size:13px;z-index:300;opacity:0;transition:opacity .3s;pointer-events:none;font-weight:600}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="app">

<div class="topbar">
  <button class="menu-btn" onclick="toggleSidebar()">
    <svg width="16" height="16" fill="none" viewBox="0 0 16 16"><path d="M2 4h12M2 8h12M2 12h12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
  </button>
  <div class="logo">lab<span>plan</span></div>
  <div class="nav-center">
    <button class="nav-btn" onclick="navMonth(-1)">
      <svg width="13" height="13" fill="none" viewBox="0 0 13 13"><path d="M8 2L3 6.5 8 11" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <span class="mlabel" id="mlabel">Loading...</span>
    <button class="nav-btn" onclick="navMonth(1)">
      <svg width="13" height="13" fill="none" viewBox="0 0 13 13"><path d="M5 2l5 4.5L5 11" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <button class="btn-today" onclick="goToday()">today</button>
  </div>
  <div class="view-tabs">
    <button class="tab on" id="tab-month" onclick="setView('month')">month</button>
    <button class="tab" id="tab-task" onclick="setView('task')">tasks</button>
  </div>
  <button class="add-btn" onclick="openModal()">
    <svg width="12" height="12" fill="none" viewBox="0 0 12 12"><path d="M6 1v10M1 6h10" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/></svg>
    <span class="btn-txt">new</span>
  </button>
</div>

<div class="body-row">
  <div class="mob-overlay" id="mob-overlay" onclick="toggleSidebar()"></div>
  <div class="sidebar" id="sidebar">
    <div class="slabel">categories</div>
    <div id="cat-list"></div>
    <div class="sdiv"></div>
    <div class="gcal-area">
      <div style="font-size:10px;font-weight:700;letter-spacing:.09em;color:var(--t3);text-transform:uppercase;margin-bottom:6px">google calendar</div>
      <div id="gcal-ui"></div>
    </div>
    <div class="sdiv"></div>
    <div class="slabel" style="margin-bottom:7px">today</div>
    <div class="glass">
      <div class="gdate" id="gdate"></div>
      <div id="gentries"></div>
    </div>
  </div>

  <div class="main">
    <div id="v-month" style="flex:1;display:flex;flex-direction:column;overflow:hidden">
      <div class="mwrap">
        <div class="dow-row">
          <div class="dow-cell">Mon</div><div class="dow-cell">Tue</div><div class="dow-cell">Wed</div>
          <div class="dow-cell">Thu</div><div class="dow-cell">Fri</div>
          <div class="dow-cell" style="color:#b05848">Sat</div>
          <div class="dow-cell" style="color:#b05848">Sun</div>
        </div>
        <div class="mgrid" id="mgrid"></div>
      </div>
    </div>
    <div id="v-day" style="display:none" class="dview">
      <div class="dvhead">
        <button class="back-btn" onclick="backToMonth()">
          <svg width="12" height="12" fill="none" viewBox="0 0 12 12"><path d="M7.5 1.5L3 6l4.5 4.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          month
        </button>
        <span class="dvtitle" id="dvtitle"></span>
        <button class="add-btn" style="margin-left:auto" onclick="openModalDay()">
          <svg width="11" height="11" fill="none" viewBox="0 0 11 11"><path d="M5.5 1v9M1 5.5h9" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/></svg>
          add
        </button>
      </div>
      <div class="dvscroll" id="dvscroll"></div>
    </div>
    <div id="v-task" style="display:none" class="tview">
      <div id="tcontent"></div>
    </div>
  </div>
</div>

</div>

<div class="mbg mbg-blur" id="modal" style="display:none">
<div class="modal">
  <h3 id="mtitle">new entry</h3>
  <div class="f"><label>title</label><input id="ft" placeholder="what needs to happen?"></div>
  <div class="f"><label>category</label><div class="cgrid" id="cpicker"></div></div>
  <div class="f"><label>date</label>
    <div class="date-fields">
      <input class="df-dd" id="fd-dd" type="number" min="1" max="31" placeholder="DD" oninput="syncDate()">
      <span class="df-sep">/</span>
      <input class="df-mm" id="fd-mm" type="number" min="1" max="12" placeholder="MM" oninput="syncDate()">
      <span class="df-sep">/</span>
      <input class="df-yyyy" id="fd-yyyy" type="number" min="2020" max="2099" placeholder="YYYY" oninput="syncDate()">
    </div>
    <input type="hidden" id="fd">
  </div>
  <div class="f"><label>time (optional — needed for reminders)</label>
    <div class="t2col"><input type="time" id="fs"><input type="time" id="fe"></div>
  </div>
  <div class="f"><label>notes</label><textarea id="fn" placeholder="optional notes..."></textarea></div>
  <div class="f"><label>GCal popup reminder</label>
    <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:4px" id="rbtns">
      <button type="button" class="rem-btn" data-v="0" onclick="selRem(0)">at time</button>
      <button type="button" class="rem-btn" data-v="5" onclick="selRem(5)">5 min</button>
      <button type="button" class="rem-btn" data-v="10" onclick="selRem(10)">10 min</button>
      <button type="button" class="rem-btn" data-v="15" onclick="selRem(15)">15 min</button>
      <button type="button" class="rem-btn" data-v="30" onclick="selRem(30)">30 min</button>
    </div>
    <div style="font-size:10px;color:var(--t3);margin-top:5px" id="rnote">no reminder set</div>
  </div>
  <div class="macts">
    <button class="m-del" id="mdel" style="display:none" onclick="delEntry()">delete</button>
    <button class="m-cancel" onclick="closeModal()">cancel</button>
    <button class="m-save" onclick="saveEntry()">save</button>
  </div>
</div>
</div>

<div class="toast" id="toast"></div>

<script>
const ICONS={
  exp:`<path d="M6 2v5L2 13h12L10 7V2" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/><path d="M5.5 2h5" stroke-width="1.6" stroke-linecap="round"/>`,
  mail:`<rect x="2" y="4" width="12" height="9" rx="1.5" stroke-width="1.6"/><path d="M2 5l6 5 6-5" stroke-width="1.6" stroke-linecap="round"/>`,
  jc:`<rect x="3" y="1" width="10" height="14" rx="1.5" stroke-width="1.6"/><path d="M5.5 5.5h5M5.5 8h5M5.5 10.5h3" stroke-width="1.4" stroke-linecap="round"/>`,
  paper:`<path d="M9 1H4a1 1 0 00-1 1v12a1 1 0 001 1h8a1 1 0 001-1V5L9 1z" stroke-width="1.6" stroke-linejoin="round"/><path d="M9 1v4h4M5.5 8.5h5M5.5 11h5" stroke-width="1.4" stroke-linecap="round"/>`,
  analysis:`<rect x="2" y="11" width="3" height="4" rx="1" stroke-width="1.5"/><rect x="6.5" y="7" width="3" height="8" rx="1" stroke-width="1.5"/><rect x="11" y="4" width="3" height="11" rx="1" stroke-width="1.5"/>`,
  official:`<path d="M8 2L2 6v8h12V6L8 2z" stroke-width="1.6" stroke-linejoin="round"/><rect x="6" y="9" width="4" height="5" rx="0.5" stroke-width="1.4"/>`,
  personal:`<circle cx="8" cy="5.5" r="3" stroke-width="1.6"/><path d="M2 14c0-3.314 2.686-5 6-5s6 1.686 6 5" stroke-width="1.6" stroke-linecap="round"/>`,

function renderMonth(){
  const ms=getMS(mo);const yr=ms.getFullYear(),mn=ms.getMonth();

  document.getElementById('mlabel').textContent=`${MNAMES[mn]} ${yr}`;
  let dow=ms.getDay();dow=dow===0?6:dow-1;
  const dim=new Date(yr,mn+1,0).getDate();
  const dip=new Date(yr,mn,0).getDate();
  const cells=[];
  for(let i=dow-1;i>=0;i--)cells.push({d:new Date(yr,mn-1,dip-i),other:true});
  for(let d=1;d<=dim;d++)cells.push({d:new Date(yr,mn,d),other:false});
  while(cells.length%7!==0)cells.push({d:new Date(yr,mn+1,cells.length-dim-dow+1),other:true});
  document.getElementById('mgrid').innerHTML=cells.map(({d,other})=>{
    const ds=fmt(d);const isT=ds===tod();
    const de=entries.filter(e=>e.date===ds&&(!filterCat||e.cat===filterCat));
    const show=de.slice(0,3),more=de.length-3;
    return `<div class="dcell${isT?' today':''}${other?' other':''}" onclick="openDay('${ds}')">
      <span class="dnum">${d.getDate()}</span>

function renderDay(ds){
  const d=new Date(ds+'T00:00:00');
  const DN=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const MN=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  document.getElementById('dvtitle').textContent=`${DN[d.getDay()]}, ${d.getDate()} ${MN[d.getMonth()]} ${d.getFullYear()}`;
  const de=entries.filter(e=>e.date===ds&&(!filterCat||e.cat===filterCat));
  const byH={};
  de.forEach(e=>{const h=e.startTime?parseInt(e.startTime.split(':')[0]):null;const k=h!=null?h:'x';if(!byH[k])byH[k]=[];byH[k].push(e);});
  let html='';
  if(byH.x&&byH.x.length){
    html+=`<div class="tblock" onclick="openModalAtHour('${ds}',null)">
      <div class="tblock-bg"></div>
      <div class="tlabel" style="padding-top:8px"><span class="tlabel-hour" style="color:var(--t3);font-size:9px">all<br>day</span></div>
      <div class="tevents">${byH.x.map(evtHtml).join('')}<div class="tblock-hint">+ add here</div></div>
    </div>`;
  }
  for(let h=0;h<24;h++){
    const evs=byH[h]||[];
    const isPM=h>=12;
    const disp=h===0?'12':h<=12?String(h):String(h-12);
    const ampm=h<12?'am':'pm';
    const isNow=ds===tod()&&new Date().getHours()===h;
    html+=`<div class="tblock" onclick="openModalAtHour('${ds}',${h})">
      <div class="tblock-bg"${isNow?' style="background:rgba(91,79,207,.06)"':''}></div>
      <div class="tlabel">
        <span class="tlabel-hour" style="${isNow?'color:var(--ac)':''}">${disp}</span>
        <span class="tlabel-min" style="${isNow?'color:var(--ac)':''}">${ampm}</span>
      </div>
      <div class="tevents">${evs.map(evtHtml).join('')}${!evs.length?'<div class="tblock-hint">+ add here</div>':''}</div>
    </div>`;
  }
  const sc=document.getElementById('dvscroll');sc.innerHTML=html;
  const fh=Object.keys(byH).filter(k=>k!=='x').map(Number).sort((a,b)=>a-b)[0];
  const scrollTo=fh!=null?fh:new Date().getHours();
  setTimeout(()=>{sc.scrollTop=Math.max(0,scrollTo*52-80);},30);
}

function startGCal(){
  if(GCAL_CLIENT_ID==='YOUR_GOOGLE_CLIENT_ID'){alert('Add your Google OAuth Client ID first.');return;}
  // Build redirect URI - must exactly match what you put in Google Cloud Console
  const redirect=location.origin+'/labplan/';
  const p=new URLSearchParams({
    client_id:GCAL_CLIENT_ID,
    redirect_uri:redirect,
    response_type:'token',
    scope:GCAL_SCOPE,
    prompt:'consent'
  });
  location.href='https://accounts.google.com/o/oauth2/v2/auth?'+p;
}
function disconnectGCal(){gcalToken=null;localStorage.removeItem('lp-gcal');render();toast('Disconnected from Google Calendar');}

function handleOAuth(){
  const h=new URLSearchParams(location.hash.slice(1));const t=h.get('access_token');
  if(t){
    gcalToken=t;
    localStorage.setItem('lp-gcal',t);
    history.replaceState(null,'',location.pathname);
    toast('Connected — syncing from Google Calendar…');
    fetchFromGCal().then(()=>{render();toast('Synced ✓');});
  } else if(gcalToken){
    // Already connected — fetch on every page load to stay in sync
    fetchFromGCal().then(()=>render());
  }
}

async function fetchFromGCal(){
  if(!gcalToken) return;
  // Fetch events from 6 months ago to 6 months ahead
  const now=new Date();
  const tMin=new Date(now);tMin.setMonth(tMin.getMonth()-6);
  const tMax=new Date(now);tMax.setMonth(tMax.getMonth()+6);
  const CMAP={exp:'9',mail:'1',jc:'11',paper:'5',analysis:'2',official:'6',personal:'4',planexp:'3',meet:'7',reminder:'5',reagent:'10'};
  const CMAP_REV=Object.fromEntries(Object.entries(CMAP).map(([k,v])=>[v,k]));
  const CAT_LABEL_MAP={'Experiment':'exp','Mail':'mail','JC':'jc','Paper':'paper','Analysis':'analysis','Official':'official','Personal':'personal','Plan Exp':'planexp','Meet':'meet','Reminder':'reminder','Reagents':'reagent'};
  try{
    let url=`https://www.googleapis.com/calendar/v3/calendars/primary/events?timeMin=${tMin.toISOString()}&timeMax=${tMax.toISOString()}&maxResults=500&singleEvents=true&orderBy=startTime`;
    const res=await fetch(url,{headers:{'Authorization':'Bearer '+gcalToken}});
    if(res.status===401){gcalToken=null;localStorage.removeItem('lp-gcal');render();return;}
    if(!res.ok) return;
    const data=await res.json();
    const gcalEvents=data.items||[];
    // Convert GCal events back to labplan entries
    const fetched=[];
    gcalEvents.forEach(ev=>{
      // Only import events that have a [Category] tag in description (our events)
      const desc=ev.description||'';
      const catMatch=desc.match(/^\[([^\]]+)\]/);
      if(!catMatch) return;
      const catLabel=catMatch[1];
      const catId=CAT_LABEL_MAP[catLabel]||'exp';
      const isAllDay=!!(ev.start&&ev.start.date&&!ev.start.dateTime);
      const date=isAllDay?ev.start.date:(ev.start.dateTime||'').split('T')[0];
      const startTime=isAllDay?'':(ev.start.dateTime||'').split('T')[1]?.slice(0,5)||'';
      const endTime=isAllDay?'':(ev.end.dateTime||'').split('T')[1]?.slice(0,5)||'';
      const notes=desc.replace(/^\[[^\]]+\]\s*/,'');
      const reminder=ev.reminders?.overrides?.[0]?.minutes??null;
      // Find existing local entry by gcalId to preserve done status
      const existing=entries.find(x=>x.gcalId===ev.id);
      fetched.push({
        id:existing?.id||(ev.id.slice(0,12)+Math.random().toString(36).slice(2,6)),
        title:ev.summary||'',
        cat:catId,date,startTime,endTime,notes,
        reminderMin:reminder,
        done:existing?.done||false,
        gcalId:ev.id
      });
    });
    if(fetched.length>0){
      // Merge: keep local entries that aren't in GCal, add/update GCal ones
      const gcalIds=new Set(fetched.map(e=>e.gcalId));
      const localOnly=entries.filter(e=>!e.gcalId&&!gcalIds.has(e.gcalId));
      entries=[...fetched,...localOnly];
      save();
    }
  }catch(e){console.log('GCal fetch error',e);}
}

async function pushGCal(e){
  if(!gcalToken)return;
  const c=C(e.cat);
  const CMAP={exp:'9',mail:'1',jc:'11',paper:'5',analysis:'2',official:'6',personal:'4',planexp:'3',meet:'7',reminder:'5',reagent:'10'};
  const reminders=e.reminderMin!=null?{useDefault:false,overrides:[{method:'popup',minutes:e.reminderMin}]}:{useDefault:false,overrides:[]};
  const body=e.startTime
    ?{summary:e.title,description:`[${c.label}]${e.notes?' '+e.notes:''}`,colorId:CMAP[e.cat]||'1',reminders,start:{dateTime:`${e.date}T${e.startTime}:00`,timeZone:Intl.DateTimeFormat().resolvedOptions().timeZone},end:{dateTime:`${e.date}T${e.endTime||e.startTime}:00`,timeZone:Intl.DateTimeFormat().resolvedOptions().timeZone}}
    :{summary:e.title,description:`[${c.label}]${e.notes?' '+e.notes:''}`,colorId:CMAP[e.cat]||'1',reminders,start:{date:e.date},end:{date:e.date}};
  try{
    const url=e.gcalId?`https://www.googleapis.com/calendar/v3/calendars/primary/events/${e.gcalId}`:'https://www.googleapis.com/calendar/v3/calendars/primary/events';
    const res=await fetch(url,{method:e.gcalId?'PUT':'POST',headers:{'Authorization':'Bearer '+gcalToken,'Content-Type':'application/json'},body:JSON.stringify(body)});
    if(res.ok){const data=await res.json();const i=entries.findIndex(x=>x.id===e.id);if(i>-1){entries[i].gcalId=data.id;save();}toast('Synced to Google Calendar ✓');}
    else if(res.status===401){gcalToken=null;localStorage.removeItem('lp-gcal');render();toast('GCal token expired — reconnect');}
  }catch{toast('GCal sync failed — check connection');}
}

document.addEventListener('keydown',ev=>{
  if(ev.key==='Escape')closeModal();
  if(ev.key==='n'&&!['INPUT','TEXTAREA','SELECT'].includes(ev.target.tagName))openModal();
});
document.getElementById('modal').addEventListener('click',function(ev){if(ev.target===this)closeModal();});

if('serviceWorker' in navigator){
  navigator.serviceWorker.register('/labplan/sw.js').catch(()=>{});
}

handleOAuth();
render();
setView('month');
// Restore sidebar: collapse on mobile always, on desktop only if user previously closed it
const _s=document.getElementById('sidebar');
const _saved=localStorage.getItem('lp-sidebar');
if(window.innerWidth<=640){_s.classList.add('collapsed');}
else if(_saved==='0'){_s.classList.add('collapsed');}
</script>
</body>
</html>
